<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" width="900" height="720" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="720" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">견피티 (GeonPiTi) — 시스템 아키텍처 블록도</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#64748B">AI &amp; YouTube 기반 PC 부품 정보 플랫폼</text>

  <!-- ── Layer 1: 사용자 ── -->
  <rect x="300" y="72" width="300" height="54" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="450" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#1D4ED8">🖥️ 사용자 (Browser)</text>
  <text x="450" y="114" text-anchor="middle" font-size="11" fill="#3B82F6">Chrome / Safari / Mobile Web</text>

  <!-- Arrow 1→2 -->
  <line x1="450" y1="126" x2="450" y2="148" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="462" y="141" font-size="10" fill="#94A3B8">HTTP</text>

  <!-- ── Layer 2: Flask ── -->
  <rect x="100" y="148" width="700" height="180" rx="10" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="450" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803D">⚙️ Flask 웹 서버 (run.py)</text>

  <!-- Blueprints -->
  <rect x="128" y="180" width="644" height="38" rx="7" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="450" y="196" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">라우터 (Blueprints)</text>
  <text x="450" y="211" text-anchor="middle" font-size="10" fill="#166534">/main · /parts · /quote · /auth · /community</text>

  <!-- Sub boxes inside Flask -->
  <!-- Jinja2 -->
  <rect x="128" y="228" width="190" height="84" rx="7" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="223" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">Jinja2 Templates</text>
  <text x="223" y="264" text-anchor="middle" font-size="10" fill="#065F46">HTML 렌더링</text>
  <text x="223" y="278" text-anchor="middle" font-size="10" fill="#065F46">base / parts / quote</text>
  <text x="223" y="292" text-anchor="middle" font-size="10" fill="#065F46">auth / community</text>

  <!-- 비즈니스 로직 -->
  <rect x="338" y="228" width="190" height="84" rx="7" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="433" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">비즈니스 로직</text>
  <text x="433" y="264" text-anchor="middle" font-size="10" fill="#065F46">routes/*.py</text>
  <text x="433" y="278" text-anchor="middle" font-size="10" fill="#065F46">SQLAlchemy ORM</text>
  <text x="433" y="292" text-anchor="middle" font-size="10" fill="#065F46">models/*.py</text>

  <!-- Flask-Login -->
  <rect x="548" y="228" width="190" height="84" rx="7" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="643" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">Flask-Login</text>
  <text x="643" y="264" text-anchor="middle" font-size="10" fill="#065F46">세션 관리</text>
  <text x="643" y="278" text-anchor="middle" font-size="10" fill="#065F46">카카오 / 구글 OAuth</text>
  <text x="643" y="292" text-anchor="middle" font-size="10" fill="#065F46">자체 이메일 로그인</text>

  <!-- Arrows Flask → Layer 3 -->
  <line x1="225" y1="328" x2="175" y2="378" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="328" x2="450" y2="378" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="670" y1="328" x2="720" y2="378" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Layer 3: DB / 외부 API / AI ── -->

  <!-- DB -->
  <rect x="60" y="378" width="220" height="120" rx="10" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
  <text x="170" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="#C2410C">🗄️ Database</text>
  <text x="170" y="418" text-anchor="middle" font-size="10" fill="#9A3412">SQLite (개발)</text>
  <text x="170" y="432" text-anchor="middle" font-size="10" fill="#9A3412">→ PostgreSQL (배포)</text>
  <line x1="100" y1="447" x2="240" y2="447" stroke="#FED7AA" stroke-width="1"/>
  <text x="170" y="462" text-anchor="middle" font-size="10" fill="#9A3412">parts · price_histories</text>
  <text x="170" y="476" text-anchor="middle" font-size="10" fill="#9A3412">users · quotes · comments</text>

  <!-- 외부 API -->
  <rect x="340" y="378" width="220" height="120" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="450" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="#1D4ED8">🌐 외부 API</text>
  <text x="450" y="418" text-anchor="middle" font-size="10" fill="#1E40AF">네이버 쇼핑 API (가격 수집)</text>
  <text x="450" y="432" text-anchor="middle" font-size="10" fill="#1E40AF">YouTube Data API v3</text>
  <text x="450" y="447" text-anchor="middle" font-size="10" fill="#1E40AF">카카오 / 구글 OAuth</text>
  <text x="450" y="462" text-anchor="middle" font-size="10" fill="#1E40AF">youtube-transcript-api</text>
  <text x="450" y="476" text-anchor="middle" font-size="10" fill="#1E40AF">환율 API (예정)</text>

  <!-- AI / Ollama -->
  <rect x="620" y="378" width="220" height="120" rx="10" fill="#FDF4FF" stroke="#A855F7" stroke-width="1.5"/>
  <text x="730" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="#7E22CE">🤖 AI (Ollama)</text>
  <text x="730" y="418" text-anchor="middle" font-size="10" fill="#6B21A8">Gemma3 4B (로컬, 무료)</text>
  <line x1="650" y1="430" x2="840" y2="430" stroke="#E9D5FF" stroke-width="1"/>
  <text x="730" y="447" text-anchor="middle" font-size="10" fill="#6B21A8">① 자연어 부품 추천</text>
  <text x="730" y="462" text-anchor="middle" font-size="10" fill="#6B21A8">② YouTube 리뷰 요약</text>
  <text x="730" y="476" text-anchor="middle" font-size="10" fill="#6B21A8">i7-14700HX · RAM 16GB</text>

  <!-- Arrow DB → APScheduler -->
  <line x1="170" y1="498" x2="170" y2="548" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Layer 4: APScheduler ── -->
  <rect x="60" y="548" width="220" height="72" rx="10" fill="#FEF9C3" stroke="#EAB308" stroke-width="1.5"/>
  <text x="170" y="570" text-anchor="middle" font-size="12" font-weight="bold" fill="#854D0E">⏱️ APScheduler</text>
  <text x="170" y="588" text-anchor="middle" font-size="10" fill="#713F12">6시간 주기 자동 실행</text>
  <text x="170" y="604" text-anchor="middle" font-size="10" fill="#713F12">가격 수집 → PriceHistory 기록</text>

  <!-- ── Data Flow Section ── -->
  <rect x="340" y="520" width="500" height="160" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="590" y="542" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">📊 주요 데이터 흐름</text>

  <text x="356" y="562" font-size="10" fill="#334155">① 가격수집</text>
  <text x="356" y="576" font-size="10" fill="#64748B">  APScheduler → 네이버API → current_price 업데이트</text>

  <text x="356" y="596" font-size="10" fill="#334155">② AI 부품추천</text>
  <text x="356" y="610" font-size="10" fill="#64748B">  자연어 입력 → DB 목록 주입 → Gemma3 → 견적 생성</text>

  <text x="356" y="630" font-size="10" fill="#334155">③ 리뷰 요약</text>
  <text x="356" y="644" font-size="10" fill="#64748B">  YouTube 자막 추출 → Gemma3 요약 → 장단점 카드</text>

  <text x="356" y="664" font-size="10" fill="#334155">④ 로그인</text>
  <text x="356" y="678" font-size="10" fill="#64748B">  OAuth 콜백 or 이메일/PW → Flask-Login 세션</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94A3B8"/>
    </marker>
  </defs>

</svg>
